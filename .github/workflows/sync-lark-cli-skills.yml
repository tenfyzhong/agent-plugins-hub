name: Sync Lark CLI skills

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-lark-cli-skills
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Sync skills from larksuite/cli
        id: sync
        run: |
          ./scripts/sync_lark_cli_skills.sh
          if [[ -n "$(git status --porcelain -- plugins/lark-cli-skills)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: python3 -m unittest discover -s tests

      - name: Commit and push the update
        if: steps.sync.outputs.changed == 'true'
        run: |
          revision=$(cat plugins/lark-cli-skills/.upstream-revision)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/lark-cli-skills
          git commit -s -m "chore(lark-cli-skills): sync upstream ${revision:0:12}"
          git push
